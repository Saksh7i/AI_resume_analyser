<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <style>
        html, body {
    height: 100%;
    margin: 0;
        }

        body{
            width: 100%;
            height: 100%;
            background-color: rgb(237, 240, 237);
            font-family: Arial;
            text-align:center;
            margin-top:150px;
            min-height: 100vh;
            background-image: url("bg.jpg");
            background-size: cover;     
            background-repeat: no-repeat;
            background-position: center;
        }

         h1, h2 {
        color: rgb(11, 65, 14);
        text-decoration: underline;



         }

        button{
            padding:10px 20px;
            background:#0b3814;
            border: 5px solid rgb(7, 60, 7);
            box-shadow: #0c3a15;
            color:white;
            border:none;
            cursor:pointer;
        }
        .container {
        max-width: 500px;
        height: 250px;
        margin: 10px auto;
        padding: 20px;
        background-color: rgb(97, 160, 105);
        border-radius: 10px;
        box-shadow: 5px 5px 10px rgba(238, 61, 61, 0.1);

    </style>
</head>

<body>

<div class="container">

    <h1>AI Resume Analyzer</h1>
    <form action="/analyze" method="POST" enctype="multipart/form-data">
        
        <input type="file" name="resume" required>
        <br><br>

        <button type="submit">
            Analyze Resume
        </button>

    </form>

</div>

</body>
</html>
